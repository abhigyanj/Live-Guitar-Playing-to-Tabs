<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="guitarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Guitar body -->
  <ellipse cx="50" cy="60" rx="35" ry="30" fill="url(#guitarGrad)" stroke="#92400e" stroke-width="2"/>
  <!-- Sound hole -->
  <circle cx="50" cy="60" r="10" fill="#1f2937"/>
  <!-- Guitar neck -->
  <rect x="45" y="10" width="10" height="35" fill="#78350f" stroke="#92400e" stroke-width="1"/>
  <!-- Headstock -->
  <rect x="43" y="5" width="14" height="10" rx="2" fill="#78350f" stroke="#92400e" stroke-width="1"/>
  <!-- Strings -->
  <line x1="47" y1="15" x2="47" y2="90" stroke="#fbbf24" stroke-width="0.5"/>
  <line x1="50" y1="15" x2="50" y2="90" stroke="#fbbf24" stroke-width="0.5"/>
  <line x1="53" y1="15" x2="53" y2="90" stroke="#fbbf24" stroke-width="0.5"/>
  <!-- Tuning pegs -->
  <circle cx="44" cy="8" r="2" fill="#fbbf24"/>
  <circle cx="44" cy="12" r="2" fill="#fbbf24"/>
  <circle cx="56" cy="8" r="2" fill="#fbbf24"/>
  <circle cx="56" cy="12" r="2" fill="#fbbf24"/>
  <!-- Tab notation hint -->
  <text x="50" y="98" font-family="Arial, sans-serif" font-size="10" fill="#1f2937" text-anchor="middle" font-weight="bold">TAB</text>
</svg>
